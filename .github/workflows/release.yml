name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the DMG (e.g. 0.1.0-dev)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install build tools (mint + quicktype)
        run: |
          brew install mint quicktype

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: bash scripts/build-web.sh

      - name: Generate IPC types
        run: bash scripts/gen-ipc.sh

      - name: Bundle Swift app
        run: |
          export PATH="$HOME/.mint/bin:$PATH"
          mint bootstrap
          mint run swift-bundler bundle

      - name: Drop AppIcon + ad-hoc re-sign
        run: |
          APP_PATH="$(find .build/bundler -maxdepth 4 -name 'DSPlay.app' -type d | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "DSPlay.app not found" >&2
            exit 1
          fi
          if [ -f DSPlay/Resources/AppIcon.icns ]; then
            cp DSPlay/Resources/AppIcon.icns "$APP_PATH/Contents/Resources/AppIcon.icns"
          fi
          codesign --deep --force --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Determine version label
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="${{ github.event.inputs.version }}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building DSPlay $VER"

      - name: Stage DMG contents
        run: |
          STAGE="$(mktemp -d)/DSPlay"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          echo "STAGE_DIR=$STAGE" >> "$GITHUB_ENV"

      - name: Build DMG
        run: |
          mkdir -p dist
          DMG="dist/DSPlay-${{ steps.ver.outputs.version }}.dmg"
          hdiutil create \
            -volname "DSPlay" \
            -srcfolder "$STAGE_DIR" \
            -ov -format UDZO \
            "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          ls -la "$DMG"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSPlay-${{ steps.ver.outputs.version }}-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            **Ad-hoc signed build** — macOS will warn on first launch.
            Right-click `DSPlay.app` → Open → confirm to bypass Gatekeeper. After that it launches normally.
