format_version = 2

[apps.DSPlay]
identifier = "app.dsplay"
product = "DSPlay"
version = "0.2.0"
category = "public.app-category.music"
minimum_macos_version = "26.0"

[apps.DSPlay.plist]
CFBundleDisplayName = "DS Music"
LSMinimumSystemVersion = "26.0"
NSPrincipalClass = "NSApplication"
NSHumanReadableCopyright = ""

# Native URLSession is ATS-bound (unlike the old WKWebView custom-scheme path).
# A Synology NAS is commonly reached over plain http:// on a LAN IP, so allow
# arbitrary loads — the app talks only to the user-entered NAS host.
[apps.DSPlay.plist.NSAppTransportSecurity]
NSAllowsArbitraryLoads = true
